const fit4PL = (pts) => {
const validPts = pts.filter(p=>!isNaN(p.x)&&!isNaN(p.y));
if (validPts.length < 3) return null;
const minX = Math.min(...validPts.map(p=>p.x));
const maxX = Math.max(...validPts.map(p=>p.x));
let bestIC50=1, bestH=1, minErr=Infinity;
for (let v=Math.log10(minX)-2; v<=Math.log10(maxX)+2; v+=0.2)
for (let h=0.1; h<=5; h+=0.2) {
const ic50=Math.pow(10,v);
const e=validPts.reduce((s,p)=>s + (p.w||1) * Math.pow(p.y-(100/(1+Math.pow(p.x/ic50,h))),2),0);
if(e<minErr){minErr=e;bestIC50=ic50;bestH=h;}
}
const vb=Math.log10(bestIC50);
for (let v=vb-0.2; v<=vb+0.2; v+=0.01)
for (let h=Math.max(0.01,bestH-0.2); h<=bestH+0.2; h+=0.01) {
const ic50=Math.pow(10,v);
const e=validPts.reduce((s,p)=>s + (p.w||1) * Math.pow(p.y-(100/(1+Math.pow(p.x/ic50,h))),2),0);
if(e<minErr){minErr=e;bestIC50=ic50;bestH=h;}
}
let avg_sd = validPts.reduce((s,p)=>s+(p.sd||0), 0) / validPts.length;
if (avg_sd === 0) {
const sse=validPts.reduce((s,p)=>s + Math.pow(p.y-(100/(1+Math.pow(p.x/bestIC50,bestH))),2),0);
avg_sd=Math.sqrt(sse/Math.max(1,validPts.length-2));
}
const slope=(25*bestH)/bestIC50;
const se=isFinite(avg_sd/slope)&&(avg_sd/slope)>=0 ? avg_sd/slope : 0;
return {ic50:bestIC50, hill:bestH, se};
};

const errBarPlugin = {
id:'errBars',
afterDatasetsDraw(chart) {
const {ctx, chartArea} = chart;
if (!chartArea) return;
chart.data.datasets.forEach((ds,i)=>{
if (!ds.errorBars) return;
const meta=chart.getDatasetMeta(i);
if (meta.hidden) return;
ctx.save();
ctx.beginPath();
ctx.rect(chartArea.left, chartArea.top, chartArea.width, chartArea.height);
ctx.clip();
ctx.lineWidth=2; ctx.strokeStyle=ds.borderColor||'#000';
meta.data.forEach((el,idx)=>{
const eb=ds.errorBars[idx];
if (!eb || (eb.plus===0&&eb.minus===0)) return;
const xp=el.x;
const yv=typeof ds.data[idx]==='object'&&ds.data[idx]!==null ? ds.data[idx].y : ds.data[idx];
const yup=chart.scales.y.getPixelForValue(yv+eb.plus);
const ydn=chart.scales.y.getPixelForValue(yv-eb.minus);
ctx.beginPath();
ctx.moveTo(xp,ydn); ctx.lineTo(xp,yup);
ctx.moveTo(xp-5,yup); ctx.lineTo(xp+5,yup);
ctx.moveTo(xp-5,ydn); ctx.lineTo(xp+5,ydn);
ctx.stroke();
});
ctx.restore();
});
}
};

function toHex(color) {
if (!color) return '#888888';
if (/^#[0-9a-f]{6}$/i.test(color)) return color.toLowerCase();
return color;
}
function lighten(hex, f) {
const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
return '#'+[r,g,b].map(ch=>Math.round(ch+(255-ch)*f).toString(16).padStart(2,'0')).join('');
}
function darken(hex, f) {
const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
return '#'+[r,g,b].map(ch=>Math.round(ch*(1-f)).toString(16).padStart(2,'0')).join('');
}
function needsDarkText(hex) {
const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
return (0.299*r+0.587*g+0.114*b) > 160;
}

const REGION_PALETTE = ['#ef4444', '#f97316', '#8b5cf6', '#06b6d4', '#10b981', '#f43f5e', '#3b82f6', '#84cc16'];
const getRegionColor = (regName) => {
if (!regName || regName === 'Primary') return 'transparent';
let hash = 0;
for(let i=0; i<regName.length; i++) hash = regName.charCodeAt(i) + ((hash << 5) - hash);
return REGION_PALETTE[Math.abs(hash) % REGION_PALETTE.length];
};

if (val === 0) return "0";
if (val >= 100) return Math.round(val).toString();
const prec = parseFloat(val.toPrecision(3));
if (Math.abs(prec) < 0.001) return prec.toExponential(2);
return parseFloat(prec.toFixed(4)).toString();
};

const parsePayload = (exp) => {
    if (!exp || !exp.payload) return null;
    try {
        let pStr = exp.payload;
        // Check if string is NOT starting with JSON open bracket
        if (exp.isCompressed || (!pStr.startsWith('{') && !pStr.startsWith('['))) {
            try {
                const dec = LZString.decompressFromUTF16(pStr);
                if (dec) pStr = dec;
            } catch(err) { console.error("Decompression fail", err); }
        }
        return JSON.parse(pStr);
    } catch(e) { 
        console.error("Payload parse error", e);
        return null; 
    }
};

const RichTextEditor = ({ value, onChange, placeholder }) => {
const editorRef = useRef(null);
useEffect(() => {
if (editorRef.current && editorRef.current.innerHTML !== value) {
editorRef.current.innerHTML = value || '';
}
}, [value]);
const execCmd = (cmd, val=null) => {
document.execCommand(cmd, false, val);
onChange(editorRef.current.innerHTML);
editorRef.current.focus();
};

const handlePaste = (e) => {
    const items = (e.clipboardData || e.originalEvent?.clipboardData)?.items;
    if (!items) return;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
            e.preventDefault(); // Stop standard large paste
            const blob = items[i].getAsFile();
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX_WIDTH = 400; // Resize target max-width (more aggressive)
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // Compress to JPG at 50% quality to ensure tiny size
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.5); 
                    document.execCommand('insertImage', false, dataUrl);
                    onChange(editorRef.current.innerHTML);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(blob);
            break; // Handle only one image per paste to prevent overload
        }
    }
};

const movePlate = (id, direction) => {
setPlates(prev => {
    const groupName = prev.find(p=>p.id===id)?.name;
    const groupPlates = prev.filter(p=>p.name === groupName);
    const idxInGroup = groupPlates.findIndex(p=>p.id===id);
    if(idxInGroup < 0) return prev;
    let swapId = null;
    if(direction === 'left' && idxInGroup > 0) swapId = groupPlates[idxInGroup-1].id;
    if(direction === 'right' && idxInGroup < groupPlates.length - 1) swapId = groupPlates[idxInGroup+1].id;
    if(!swapId) return prev;
    const globalIdx1 = prev.findIndex(p=>p.id===id);
    const globalIdx2 = prev.findIndex(p=>p.id===swapId);
    const arr = [...prev];
    [arr[globalIdx1], arr[globalIdx2]] = [arr[globalIdx2], arr[globalIdx1]];
    return arr;
});
};

const formatUrlName = (url) => {
  try {
    const parsedUrl = new URL(url);
    if (parsedUrl.hostname.includes('drive.google.com') || parsedUrl.hostname.includes('docs.google.com')) {
      const match = url.match(/[-\w]{25,}/);
      const id = match ? match[0].substring(0, 6) + '...' : 'Unknown';
      if (parsedUrl.pathname.includes('/folder')) return `Drive Folder (${id})`;
      if (parsedUrl.hostname.includes('docs.google.com/spreadsheets')) return `Sheet (${id})`;
      if (parsedUrl.hostname.includes('docs.google.com/document')) return `Doc (${id})`;
      if (parsedUrl.hostname.includes('docs.google.com/presentation')) return `Slide (${id})`;
      return `Drive File (${id})`;
    }
    const pathParts = parsedUrl.pathname.split('/');
    const lastPart = pathParts[pathParts.length - 1];
    return lastPart ? lastPart : parsedUrl.hostname;
  } catch (e) {
    return url.length > 30 ? url.substring(0, 30) + '...' : url;
  }
};

const getRole = (r,c) => {

const concOf = (r,c,role) => {

const wellColor = (r,c) => {

const rl=role.toLowerCase();
if(rl==='medium') return {bg:'#ff4d6d',dark:false};
if(rl==='pbs')    return {bg:'#e5e7eb',dark:true};
if(rl==='cells')  return {bg:'#fef08a',dark:true};

const base = cmpColor(role, idx !== -1 ? idx : 0);

} else {
let step = 0;
for (let c=0; c<activePlateDim.cols; c++) {
if (!nc[r][c].role || nc[r][c].role === oldRole) {
nc[r][c].role = role;
if(isCtrl) nc[r][c].conc = 0;
else { const s = customConc[role] || { top: tConc, dil: dFact }; nc[r][c].conc = s.top / Math.pow(s.dil, step); }
step++;
}
}
}
const nrc=[...rowCompounds]; nrc[r]=role;
updatePlate({ cellConfig: nc, rowCompounds: nrc });
const t=v.trim(); if(t&&!allCmpds.includes(t)) setCustomCmpds(p=>[...p,t]);
};

const updateCellCfg = (r,c,upd) => { const nc=cellConfig.map(row=>row.map(cell=>({...cell}))); nc[r][c]={...nc[r][c],...upd}; updatePlate({ cellConfig: nc }); };
const addCustomCmp = () => { const el=document.getElementById('new-cmp'); const v=el.value.trim(); if(v&&!allCmpds.includes(v)){ setCustomCmpds(p=>[...p,v]); el.value=''; } };
const addCustomCellLine = () => { const el=document.getElementById('new-cellline'); const v=el.value.trim(); if(v&&!allCellLines.includes(v)){ setCustomCellLines(p=>[...p,v]); el.value=''; } };

const cleanOutliers = () => {
const nc=cellConfig.map(row=>row.map(c=>({...c}))); let changed=false;
Object.entries(processedByRegion).forEach(([reg, comps]) => {
comps.forEach(cmp => {
for(let it=0;it<10;it++){
const pts=[];
grid.forEach((_,r)=>grid[r].forEach((_,c)=>{
if(r >= activePlateDim.rows || c >= activePlateDim.cols) return;
const cfg = nc[r][c]; const role = getRole(r,c);
if((cfg.region||'Primary')===reg && role===cmp.name && !cfg.manualOverride && !cfg.excluded){
const n=rawOD(r,c); const xc=concOf(r,c,role);
if(!isNaN(n) && xc > 0) pts.push({r,c,realX:xc,val:viability(n),w:1});
}
}));
if(pts.length<4) break;
const ft=fit4PL(pts); if(!ft) break;
let worst=null,maxE=0; const byC={};
pts.forEach(p=>{ const k = concKey(p.realX); if(!byC[k]) byC[k]=[]; byC[k].push(p); });
Object.values(byC).forEach(cps=>{
if(cps.length<2) return;
const mn=cps.reduce((s,p)=>s+p.val,0)/cps.length;
const pred=100/(1+Math.pow(cps[0].realX/ft.ic50,ft.hill));
if(Math.abs(mn-pred) < 10) return;
cps.forEach(p=>{ const e2=Math.abs(p.val-pred); if(e2>maxE&&e2>10){maxE=e2;worst=p;} });
});
if(worst){ nc[worst.r][worst.c].excluded=true; changed=true; } else break;
}
});
});
if(changed) updatePlate({ cellConfig: nc });
};

const rd = new FileReader();
rd.onload = ev => {
try {
const txt = ev.target.result;
const m = txt.match(/window\.__MTT_SAVED_STATE__\s*=\s*(\{[\s\S]*?\});/);
if(!m) { setDialog({type: 'alert', message: 'No saved state found.'}); return; }
const s = JSON.parse(m[1]);
let loadedPlates = [];
if (s.mtt_plates_v4) loadedPlates = s.mtt_plates_v4;
else if (s.mtt_plates_v3) loadedPlates = s.mtt_plates_v3;
else if (s.mtt_plates_v2) {
loadedPlates = s.mtt_plates_v2.map(p => ({
...p, cellsSeeded: p.cellsSeeded || s.mtt_cellsSeeded || '', comments: p.comments || s.mtt_metaComments || '',
images: p.image ? [p.image] : (s.mtt_reportImage ? [s.mtt_reportImage] : []), plan: p.plan || s.mtt_plan || [],
expTypes: p.expType ? [p.expType] : [], cellLines: p.cellLine ? [p.cellLine] : [], compoundTypes: [], techniques: p.test ? [p.test] : [],
medium: p.medium || s.mtt_metaMedium || '', time: p.time || s.mtt_metaTime || '', test: p.test || s.mtt_metaTest || ''
}));
} else if (s.mtt_grid) {
loadedPlates = [{
id: 'p1', name: 'Plate 1', date: s.mtt_metaDate || '', plateType: s.mtt_plateType || '96', grid: s.mtt_grid,
compounds: s.mtt_compounds || Array(12).fill(''), rowCompounds: s.mtt_row_compounds || Array(8).fill(''),
cellConfig: s.mtt_cellConfig, ctrlType: s.mtt_ctrlType || 'cells', ctrlODStr: s.mtt_ctrlOD || '1.0',
bgType: s.mtt_bgType || 'none', bgManualStr: s.mtt_bgManual || '0', cellsSeeded: s.mtt_cellsSeeded || '', comments: s.mtt_metaComments || '',
images: s.mtt_reportImage ? [s.mtt_reportImage] : [], plan: s.mtt_plan || [], expTypes: [], cellLines: [], compoundTypes: [], techniques: s.mtt_metaTest ? [s.mtt_metaTest] : [],
medium: s.mtt_metaMedium || '', time: s.mtt_metaTime || '', test: s.mtt_metaTest || ''
}];
}
if (loadedPlates.length > 0) {
    // Sanitize: aggressively strip out huge legacy embedded base64 images that break cloud saving
    loadedPlates = loadedPlates.map(p => {
        let safeComments = p.comments || '';
        safeComments = safeComments.replace(/<img[^>]+src="data:image\/[^;]+;base64,([^">]{100000,})"[^>]*>/gi, '<br/><span style="color:red; font-size:10px; font-weight:bold;">[Large legacy embedded image automatically removed to allow cloud saving]</span><br/>');
        let safeImages = (p.images || []).filter(img => !(img.startsWith('data:image/') && img.length > 100000));
        let legacyImage = p.image && p.image.startsWith('data:image/') && p.image.length > 100000 ? null : p.image;
        return { ...p, comments: safeComments, images: safeImages, image: legacyImage };
    });
    setPendingLoad({ plates: loadedPlates, fullState: s });
}
else setDialog({type: 'alert', message: 'Could not parse plates from file.'});
} catch(ex){ setDialog({type:'alert', message:'Parse error: '+ex.message}); }
};
rd.readAsText(f); e.target.value='';
};

))}
</div>
</div>
</div>
</div>
);
}

function RegionCharts({ regionName, regionData, config }) {
const { chartCfg, fitIC50, showExcl, eScale, fsPanel, chartH, drWidth, hiddenCmpds, cellConfig, setCellConfig, activePlateDim, toggleFs, unit } = config;
const drRef = useRef(null);
const ic50Ref = useRef(null);
const drChart = useRef(null);
const ic50Chart = useRef(null);
const isDrFs = fsPanel === `dr_${regionName}`;
const isIc50Fs = fsPanel === `ic50_${regionName}`;

useEffect(() => {
if(!drRef.current) return;
const ds=[], map=[];
regionData.forEach(cd=>{
if(hiddenCmpds[cd.name]) return;
if(cd.fit){
const lbl=`${cd.name} (IC50:${cd.fit.ic50.toFixed(2)}±${(cd.fit.se * eScale).toFixed(2)} ${unit})`;
const minL=Math.min(...cd.vPts.map(p=>p.x))-0.2;
const maxL=Math.max(...cd.vPts.map(p=>p.x))+0.2;
const curve=[]; const step=(maxL-minL)/60;
for(let v=minL;v<=maxL+step*0.5;v+=step)
curve.push({x:v,y:100/(1+Math.pow(Math.pow(10,v)/cd.fit.ic50,cd.fit.hill))});
ds.push({label:lbl,data:curve,borderColor:cd.color,backgroundColor:'transparent',borderWidth:2,pointRadius:0,fill:false,type:'line',tension:0,showLine:true});
map.push(null);
}
if(cd.vPts.length>0){
ds.push({
label:cd.fit?`${cd.name} [pts]`:cd.name,
data:cd.vPts,
errorBars:cd.vPts.map(p=>({plus:p.sd*eScale,minus:p.sd*eScale})),
borderColor:cd.color,backgroundColor:cd.color,borderWidth:2,
pointBackgroundColor:cd.color,
pointStyle:chartCfg.ptStyle||'circle',
pointRadius:chartCfg.ptSize!=null?chartCfg.ptSize:5,
fill:false,type:'scatter',showLine:false
});
map.push({name:cd.name,excl:false});
}
if(cd.ePts.length>0&&showExcl){
ds.push({
label:`${cd.name} [excl]`,data:cd.ePts,
borderColor:'#9ca3af',backgroundColor:'#9ca3af',borderWidth:2,
pointStyle:'crossRot',pointRadius:(chartCfg.ptSize!=null?chartCfg.ptSize:5)+2,
fill:false,type:'scatter',showLine:false
});
map.push({name:cd.name,excl:true});
}
});

if(drChart.current) drChart.current.destroy();
drChart.current = new Chart(drRef.current,{
type:'line', data:{datasets:ds}, plugins:[errBarPlugin],
options:{
onClick:(evt,els,chart)=>{
const nc=cellConfig.map(row=>row.map(c=>({...c})));
let changed=false;
if(els.length>0){
const m=map[els[0].datasetIndex]; if(!m) return;
const pd=chart.data.datasets[els[0].datasetIndex].data[els[0].index];
if(pd&&pd.pts){ pd.pts.forEach(p=>{nc[p.r][p.c].excluded=!m.excl;nc[p.r][p.c].manualOverride=true;}); changed=true; }
} else {
const pos=Chart.helpers.getRelativePosition(evt,chart);
const dx=chart.scales.x.getValueForPixel(pos.x);
let md=Infinity,tx=null;
regionData.forEach(cd=>[...cd.vPts,...cd.ePts].forEach(p=>{const d=Math.abs(p.x-dx);if(d<md){md=d;tx=p.x;}}));
if(tx!==null&&md<0.2){
for(let r=0; r<activePlateDim.rows; r++) {
for(let c=0; c<activePlateDim.cols; c++) {
const cfg = nc[r][c];
if((cfg.region||'Primary')!==regionName) continue;
const xc = Number(cfg.conc) || 0;
if(xc>0&&Math.abs(Math.log10(xc)-tx)<0.05&&cfg.excluded){
cfg.excluded=false; cfg.manualOverride=true; changed=true;
}
}
}
}
}
if(changed) setCellConfig(nc);
},
responsive:true,maintainAspectRatio:false,
interaction:{mode:'nearest',intersect:false},
scales:{
x:{
type:'linear',position:chartCfg.xPos||'bottom',
min:chartCfg.xMin!==''?parseFloat(chartCfg.xMin):undefined,
max:chartCfg.xMax!==''?parseFloat(chartCfg.xMax):undefined,
title:{display:true,text:`Log₁₀ [Conc. (${unit})]`,font:{size:chartCfg.fontSize+2,weight:'bold'},color:'#374151'},
ticks:{
font:{size:chartCfg.fontSize},color:'#4b5563',
callback: function(value) { return value.toFixed(2); }
}
},
y:{position:chartCfg.yPos||'left',
min:chartCfg.yMin!==''?parseFloat(chartCfg.yMin):undefined,
max:chartCfg.yMax!==''?parseFloat(chartCfg.yMax):undefined,
title:{display:true,text:'Viability (%)',font:{size:chartCfg.fontSize+2,weight:'bold'},color:'#374151'},
ticks:{font:{size:chartCfg.fontSize},color:'#4b5563'}}
},
plugins:{
legend:{position:'top',labels:{font:{size:chartCfg.fontSize,weight:'bold'},
filter:item=>{ if(item.text.includes('[excl]')) return false; if(fitIC50&&item.text.includes('[pts]')) return false; return true; }}},
tooltip:{callbacks:{
title: ctx => {
const logX = ctx[0].parsed.x;
const realX = ctx[0].raw && ctx[0].raw.realX ? ctx[0].raw.realX : Math.pow(10, logX);
return `Conc: ${formatConc(realX)} ${unit} (log: ${logX.toFixed(2)})`;
},
label:ctx=>{
const lbl=ctx.dataset.label.replace(' [pts]','');
const y=ctx.parsed.y.toFixed(2);
if(ctx.dataset.type==='scatter'){const sd=ctx.raw.sd?ctx.raw.sd.toFixed(2):'0.00';return `${lbl}: ${y}% ± ${(sd*eScale).toFixed(2)}`;}
return `${lbl}: ${y}%`;
}
}}
}
}
});
return ()=>{ if(drChart.current) drChart.current.destroy(); };
}, [regionData, hiddenCmpds, showExcl, eScale, chartCfg, fitIC50, fsPanel, activePlateDim, cellConfig]);

useEffect(() => {
if(!ic50Ref.current||!fitIC50) return;
const labels=[],data=[],colors=[],ebars=[];
regionData.forEach(cd=>{
if(hiddenCmpds[cd.name]||!cd.fit||!isFinite(cd.fit.ic50)) return;
labels.push(cd.name);
data.push(cd.fit.ic50);
colors.push(cd.color);
const se=Math.min(cd.fit.se, cd.fit.ic50*2)*eScale;
ebars.push({plus:se, minus:se});
});

if(ic50Chart.current) ic50Chart.current.destroy();
ic50Chart.current = new Chart(ic50Ref.current,{
type:'bar',
data:{labels,datasets:[{label:`IC50 (${unit})`,data,backgroundColor:colors,borderColor:colors,borderWidth:1,errorBars:ebars}]},
plugins:[errBarPlugin],
options:{
responsive:true,maintainAspectRatio:false,
scales:{
y:{position:chartCfg.yPos||'left',beginAtZero:true,
title:{display:true,text:`IC50 (${unit})`,font:{size:chartCfg.fontSize+2,weight:'bold'},color:'#374151'},
ticks:{font:{size:chartCfg.fontSize},color:'#4b5563'}},
x:{position:chartCfg.xPos||'bottom',
ticks:{font:{size:chartCfg.fontSize,weight:'bold'},color:'#374151'}}
},
plugins:{legend:{display:false},
tooltip:{callbacks:{label:ctx=>`IC50: ${ctx.raw.toFixed(2)} ± ${(ebars[ctx.dataIndex]&&ebars[ctx.dataIndex].plus||0).toFixed(2)} ${unit}`}}}
}
});
return ()=>{ if(ic50Chart.current) ic50Chart.current.destroy(); };
}, [regionData, hiddenCmpds, fitIC50, eScale, chartCfg, fsPanel]);

return (
<div className="pdf-page-region flex flex-col gap-4 bg-gray-50 border border-gray-200 p-4 rounded-xl shadow-sm mb-4">
<h3 className="text-lg font-black text-gray-800 border-b border-gray-300 pb-2">📍 Region: {regionName}</h3>
<div className="flex flex-col lg:flex-row gap-6 pdf-row">
<div className={`pdf-chart-main flex flex-col ${isDrFs ? 'panel-fullscreen' : 'min-w-0'}`} style={!isDrFs ? {width:fitIC50?`${drWidth}%`:'100%',flexShrink:0} : {}}>
<div className="flex justify-between items-start mb-2">
<div><h2 className="text-sm lg:text-base font-bold text-gray-800">Dose-Response Plot</h2></div>
<button onClick={() => toggleFs(`dr_${regionName}`)} className="text-gray-400 hover:text-blue-600 bg-gray-100 hover:bg-blue-100 rounded p-1 transition-colors">{isDrFs ? '↙️' : '↗️'}</button>
</div>
<div className="pdf-chart-canvas-wrap" style={isDrFs ? { flex: 1, minHeight: 0, position: 'relative' } : { height: `${chartH}px`, position: 'relative' }}>
<canvas ref={drRef}/>
</div>
</div>
{fitIC50&&(
<div className={`pdf-chart-ic50 flex flex-col ${isIc50Fs ? 'panel-fullscreen' : 'min-w-0 border-t lg:border-t-0 lg:border-l border-gray-200 pt-4 lg:pt-0 lg:pl-6'}`}
style={!isIc50Fs ? {width:`${100-drWidth}%`,flexShrink:0} : {}}>
<div className="flex justify-between items-start mb-2">
<div><h2 className="text-sm lg:text-base font-bold text-gray-800">Calculated IC50</h2></div>
<button onClick={() => toggleFs(`ic50_${regionName}`)} className="text-gray-400 hover:text-blue-600 bg-gray-100 hover:bg-blue-100 rounded p-1 transition-colors">{isIc50Fs ? '↙️' : '↗️'}</button>
</div>
<div className="pdf-chart-canvas-wrap" style={isIc50Fs ? { flex: 1, minHeight: 0, position: 'relative' } : { height: `${chartH}px`, position: 'relative' }}>
<canvas ref={ic50Ref}/>
</div>
</div>
)}
</div>
</div>
);
}

function ErrInput({label, value, sdRaw, isOverridden, onSave, onReset}) {
const [local, setLocal] = useState(value !== undefined && value !== null ? Number(value).toFixed(2) : sdRaw.toFixed(2));
useEffect(()=>{ setLocal(value !== undefined && value !== null ? Number(value).toFixed(2) : sdRaw.toFixed(2)); },[value,sdRaw]);
return (
<div className="flex flex-col gap-1 min-w-[85px]">
<span className="text-[10px] font-bold text-gray-500 truncate max-w-full" title={label}>{label}</span>
<div className="flex items-center gap-1">
<input type="number" step="0.1" min="0" value={local}
onChange={e=>setLocal(e.target.value)}
onBlur={e=>{
const v=parseFloat(e.target.value);
if(isNaN(v)) onReset();
else onSave(v);
}}
className={`border rounded p-1 text-xs w-14 ${isOverridden?'border-orange-400 bg-orange-50 font-bold text-orange-700':'border-gray-300 bg-gray-50 text-gray-600'}`}/>
{isOverridden&&(
<button onClick={()=>{ setLocal(sdRaw.toFixed(2)); onReset(); }}
title="Restore SD" className="text-orange-400 hover:text-orange-600 text-sm">🔄</button>
)}
</div>
<span className={`text-[9px] ${isOverridden?'text-orange-600 font-bold':'text-gray-400'}`}>
{isOverridden ? `✏️ manual (SD:${sdRaw.toFixed(2)})` : `SD: ${sdRaw.toFixed(2)}`}
</span>
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
